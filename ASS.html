<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Cards Layout</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8f9fa;
        }

        .hero-img{
            width:100%;
            height:400px;
            object-fit:cover;
            border-radius:5px;
        }

        .card img{
            height:180px;
            object-fit:cover;
        }
    </style>
</head>
<body>

<div class="container mt-4">

    <!-- Large Image -->
    <img src="OIP.webp" class="hero-img mb-4" alt="Banner">

    <!-- Cards -->
    <div class="row">

        <div class="col-md-4 mb-3">
            <div class="card h-100">
                <img src="one-piece-anime-luffy-zoro-rhsk6szxhmchf8n6.jpg" class="card-img-top" alt="">
                <div class="card-body">
                    <h5 class="card-title">Card title 1</h5>
                    <p class="card-text">
                        TOS PHERK AHMAK
                    </p>
                    <a href="#" class="btn btn-primary">
                        Go somewhere
                    </a>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card h-100">
                <img src="OIP (1).webp" class="card-img-top" alt="">
                <div class="card-body">
                    <h5 class="card-title">Card title 2</h5>
                    <p class="card-text">
                        NH LANH KE ALONE
                    </p>
                    <a href="#" class="btn btn-primary">
                        Go somewhere
                    </a>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card h-100">
                <img src="Monster.Trio.600.3706336.jpg" class="card-img-top" alt="">
                <div class="card-body">
                    <h5 class="card-title">Card title 3</h5>
                    <p class="card-text">
                       ANH MEAN TEA 3NK PM ANH HEH -,-
                    </p>
                    <a href="#" class="btn btn-primary">
                        Go somewhere
                    </a>
                </div>
            </div>
        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
